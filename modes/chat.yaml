# Chat Mode — Interactive conversation for story creation, design, and planning
#
# Write access restricted to .craft/ and .claude/ only.
# All Craft creative and planning skills available.
# Used by: Craftsman web chat agent (SDK), CLI sessions between stories.

name: chat
description: Interactive conversation — story creation, design, planning

write_scope:
  allowed_paths:
    - .craft/
    - .claude/
  deny_message: >
    All edits must go through a story.
    Use /craft:story-new to capture this change,
    or /craft:story-implement to work on an existing story.

max_turns: 30

include:
  skills:
    - content-spark
    - creative-spark
    - design-vibe
    - lock-decision
    - plan-chunks
  commands:
    - craft
    - craft:init
    - craft:cycle-design
    - craft:cycle-start
    - craft:cycle-complete
    - craft:cycle-assign
    - craft:story-new
    - craft:story-archive
    - craft:story-delete
    - craft:status
    - craft:update-docs
    - craft:project
  agents:
    - project-scanner
    - plan-chunks-agent
