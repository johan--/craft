# Implement Mode — Autonomous story implementation
#
# Full write access to project files, gated by CRAFT_WRITE_ENABLED in .global-state.
# Only implementation-focused skills and agents loaded (smaller context = better focus).
# Used by: Craftsman implementation agent (SDK), CLI during /craft:story-implement.

name: implement
description: Autonomous story implementation

allowed_tools:
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - Bash
  - Task

permission_mode: acceptEdits

prompt: "Run /craft:story-implement-auto to implement the next ready story in the active cycle."

write_scope:
  allowed_paths:
    - "*"
  gate: CRAFT_WRITE_ENABLED
  deny_message: >
    Implementation requires an active story.
    CRAFT_WRITE_ENABLED must be set in .global-state.
    Use /craft:story-implement to start a story.

max_turns: 100

include:
  skills:
    - validate-chunk
    - refine-chunk
    - test-fix
  commands:
    - craft:story-implement
    - craft:story-implement-auto
    - craft:story-continue
  agents:
    - implementer
    - tester
    - chunk-validator
